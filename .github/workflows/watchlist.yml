# .github/workflows/watchlist.yml
# Tourne chaque lundi à 8h UTC — génère watchlist.json et le commit automatiquement

name: Update watchlist

on:
  schedule:
    - cron: '0 8 * * 1'   # Chaque lundi 8h00 UTC
  workflow_dispatch:        # Déclenchement manuel depuis l'interface GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas ta requests

      - name: Run screener
        run: python screener.py

      - name: Commit watchlist.json
        run: |
          git config user.email "bot@watchradar.fr"
          git config user.name "WatchRadar Bot"
          git add watchlist.json
          if git diff --staged --quiet; then
            echo "Aucun changement dans la watchlist cette semaine."
          else
            WEEK=$(python -c "from datetime import date; d=date.today(); print(f'Sem. {d.isocalendar()[1]} · {d.year}')")
            git commit -m "watchlist: mise à jour $WEEK"
            git push
          fi
